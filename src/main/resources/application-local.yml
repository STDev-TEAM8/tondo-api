spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true # 쿼리 확인을 위해 추가하면 좋습니다
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

app:
  frontend:
    base-url: ${FRONTEND_URL}