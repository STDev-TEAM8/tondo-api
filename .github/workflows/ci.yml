name: CI Pipeline

# main 브랜치를 향한 Pull Request가 열리거나 업데이트될 때 실행
on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Spring Boot 3.4.1 기준 Java 17 또는 21 설정 (프로젝트에 맞게 수정)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'
        cache: 'gradle' # Gradle 빌드 속도 향상을 위한 캐싱

    # 실행 권한 부여
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 테스트 실행 (이 단계가 실패하면 PR Merge 버튼이 비활성화됨)
    - name: Run Tests
      run: ./gradlew test
