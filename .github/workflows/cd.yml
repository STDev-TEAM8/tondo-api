name: CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/workflows/ci.yml'

env:
  AWS_REGION: ap-northeast-2 # AWS 리전 고정

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'
        cache: 'gradle'

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew clean build -x test

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
        ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Copy docker-compose files via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.yml, docker-compose-api.yml, docker-compose-db.yml"
        target: "/home/ubuntu"

    - name: Execute deployment and health check over SSH
      uses: appleboy/ssh-action@v1.0.3
      env:
        ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
        ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,AWS_REGION
        script: |
          cd /home/ubuntu
          
          # 1. API_IMAGE 동적 생성 및 .env 덮어쓰기
          FULL_IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "API_IMAGE=${FULL_IMAGE_URI}" > .env
          
          # 2. Database 세팅 (DB_PASSWORD는 이제 secrets에서 가져옴)
          echo "DB_HOST=${{ vars.DB_HOST }}" >> .env
          echo "DB_PORT=${{ vars.DB_PORT }}" >> .env
          echo "DB_NAME=${{ vars.DB_NAME }}" >> .env
          echo "DB_USERNAME=${{ vars.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          
          # 3. AWS Credentials 세팅 (Secrets)
          echo "AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}" >> .env
          
          # 4. S3 & Bedrock 세팅 (Variables)
          echo "S3_BUCKET=${{ vars.S3_BUCKET }}" >> .env
          echo "BEDROCK_MODEL_ID=${{ vars.BEDROCK_MODEL_ID }}" >> .env
          echo "BEDROCK_IMAGE_MODEL_ID=${{ vars.BEDROCK_IMAGE_MODEL_ID }}" >> .env
          
          # 5. Frontend 세팅
          echo "FRONTEND_URL=${{ vars.FRONTEND_URL }}" >> .env
          
          # 6. ECR 로그인 및 컨테이너 실행 (--no-build 옵션으로 로컬 빌드 방지)
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
          docker compose up -d --no-build
          
          # 7. 스마트 헬스체크 (애플리케이션이 뜰 때까지 기다림)
          MAX_RETRIES=5
          RETRY_COUNT=0
          HEALTH_URL="http://localhost:8080/actuator/health"
          
          echo "🚀 애플리케이션 헬스체크 시작..."
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_URL || echo "000")
            
            if [ "$STATUS_CODE" == "200" ]; then
              echo "✅ [성공] 애플리케이션 정상 구동 (Status: 200)"
              exit 0
            fi
            
            RETRY_COUNT=$((RETRY_COUNT+1))
            echo "⏳ 대기 중... ($RETRY_COUNT/$MAX_RETRIES) - 15초 후 재시도 (응답: $STATUS_CODE)"
            sleep 15
          done
          
          echo "❌ [실패] 헬스체크 타임아웃! 서버 로그를 확인하세요."
          exit 1
